<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Депресняк — стихи</title>

<style>
body {
    margin: 0;
    background: black;
    font-family: 'EB Garamond', serif;
    scroll-snap-type: y mandatory;
}

html {
    scroll-behavior: smooth;
}

/* Блок со стихом */
.poem-section {
    height: 100vh;
    background-size: cover;
    background-position: center;
    display: flex;
    justify-content: center;
    align-items: center;
    scroll-snap-align: start;
}

/* Текст */
.poem {
    background: rgba(0,0,0,0.6);
    padding: 30px;
    color: white;
    font-size: 22px;
    max-width: 600px;
    text-align: center;
    backdrop-filter: blur(5px);
}

/* Черный промежуток */
.gap {
    height: 120px;
    background: black;
}
.left-poem {
    justify-content: flex-start !important;
    align-items: center;
    padding-left: 60px;
}

.left-poem .poem {
    text-align: left;
    line-height: 1.8;
}
</style>

</head>

<body>

<!-- 🎧 музыка -->
<audio id="bg-music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
window.addEventListener('click', () => {
    const music = document.getElementById('bg-music');
    if (music.paused) {
        music.play();
    }
});
</script>

<!-- 🌑 СТИХ 1 (левый) -->
<section class="poem-section left-poem" style="background-image: url('https://cdn.fishki.net/upload/post/2019/10/22/3120072/n7plux7fhrt31.jpg');">
    <div class="poem">
        <p>
        Я очень люблю жить<br>
        И ненавижу жизнь<br>
        Исчезнуть<br>
        Или забыть?<br>
        Я не хочу быть…
        </p>
    </div>
</section>

<div class="gap"></div>

<!-- 🌑 СТИХ 2 -->
<section class="poem-section" style="background-image: url('img2.jpg');">
    <div class="poem">
        <p>
        второй стих…<br>
        другой фон<br>
        другое настроение
        </p>
    </div>
</section>

<div class="gap"></div>

</body>
</html>
