<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Депресняк — стихи</title>

<style>
body {
    margin: 0;
    background: black;
    font-family: 'EB Garamond', serif;
    scroll-snap-type: y mandatory;

    opacity: 0;
}

html {
    scroll-behavior: smooth;
}

/* Блок со стихом */
.poem-section {
    height: 100vh;
    background-size: cover;
    background-position: center;
    display: flex;
    justify-content: flex-start;
    align-items: flex-start;
    padding-left: 60px;
    padding-top: 60px; /* ← добавили отступ сверху вместо translate */
    position: relative;
    scroll-snap-align: start;
}

/* градиент поверх фона */
.poem-section::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.9) 0%,
        rgba(0,0,0,0.3) 30%,
        rgba(0,0,0,0.3) 70%,
        rgba(0,0,0,0.9) 100%
    );
    z-index: 0;
}

/* Текст — один раз, общий для всех стихов */
.poem {
    padding: 40px;
    max-width: 600px;
    font-size: 22px;
    text-align: left;
    line-height: 1.8;
    color: black;
    background: transparent;

    position: relative;
    z-index: 1;
}

/* Черный промежуток */
.gap {
    height: 120px;
    background: black;
}

/* Секция левого стиха */
.left-poem {
    justify-content: flex-start !important;
    align-items: flex-start !important;
    padding-left: 60px;
}

.left-text {
    transform: translateY(30px);
}

.center-text {
    transform: translateY(40px);
    text-align: center;
    margin: 0 auto;
}

.right-text {
    transform: translateY(60px);
    text-align: right;
    margin-left: auto;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        filter: brightness(0);
    }
    to {
        opacity: 1;
        filter: brightness(1);
    }
}

</style>

</head>

<body>

<!-- 🎧 музыка -->
<audio id="bg-music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>


<script>
window.addEventListener('load', () => {
    document.body.style.animation = "fadeIn 3s ease forwards";
});
</script>

<!-- 🌑 СТИХ 1 (левый) -->
<section class="poem-section left-poem" style="background-image: url('https://cdn.fishki.net/upload/post/2019/10/22/3120072/n7plux7fhrt31.jpg');">
    <div class="poem left-text big-poem">
        <p>
        Я очень люблю жить<br>
        И ненавижу жизнь<br>
        Исчезнуть<br>
        Или забыть?<br>
        Я не хочу быть…
        </p>
    </div>
</section>

<div class="gap"></div>

<!-- 🌑 СТИХ 2 -->
<section class="poem-section" style="background-image: url('img2.jpg');">
    <div class="poem">
        <p>
        второй стих…<br>
        другой фон<br>
        другое настроение
        </p>
    </div>
</section>

<div class="gap"></div>

</body>
</html>
